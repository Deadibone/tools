<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Trimmer Pro</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* slate-900 */
            color: #f8fafc; /* slate-50 */
        }
        
        /* Custom scrollbar for the waveform if zoomed in */
        ::-webkit-scrollbar {
            height: 8px;
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b; 
        }

        #waveform ::part(region) {
            border-left: 2px solid #818cf8;
            border-right: 2px solid #818cf8;
            border-radius: 4px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 md:p-8">

    <main class="max-w-5xl w-full mx-auto flex-1 flex flex-col gap-6">
        
        <!-- Header -->
        <header class="text-center mb-4">
            <h1 class="text-3xl md:text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-400 flex items-center justify-center gap-3">
                <i data-lucide="scissors" class="w-8 h-8 text-indigo-400"></i>
                Audio Trimmer Pro
            </h1>
            <p class="text-slate-400 mt-2 text-sm md:text-base">Upload an MP3 or M4A file, visually select a region, and export.</p>
        </header>

        <!-- Upload Zone -->
        <div id="upload-zone" class="border-2 border-dashed border-slate-600 rounded-2xl bg-slate-800/50 p-12 text-center transition-all hover:bg-slate-800 hover:border-indigo-500 cursor-pointer relative flex flex-col items-center justify-center min-h-[300px]">
            <input type="file" id="audio-upload" accept=".mp3, .m4a, audio/mp3, audio/m4a, audio/mpeg, audio/aac, audio/wav" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
            
            <div class="bg-indigo-500/20 p-4 rounded-full mb-4">
                <i data-lucide="music" class="w-10 h-10 text-indigo-400"></i>
            </div>
            <h3 class="text-xl font-semibold mb-2">Drag & Drop your audio file here</h3>
            <p class="text-slate-400 text-sm mb-6">Supports MP3, M4A, WAV (Max 100MB recommended)</p>
            <button class="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-medium transition-colors z-20 relative pointer-events-none">
                Browse Files
            </button>
        </div>

        <!-- Editor Zone (Hidden by default) -->
        <div id="editor-zone" class="hidden flex-col gap-6 bg-slate-800 rounded-2xl p-6 shadow-xl border border-slate-700">
            
            <div class="flex items-center justify-between border-b border-slate-700 pb-4">
                <div class="flex items-center gap-3 overflow-hidden">
                    <i data-lucide="file-audio" class="w-5 h-5 text-indigo-400 flex-shrink-0"></i>
                    <span id="file-name" class="font-medium truncate text-slate-200">filename.mp3</span>
                </div>
                <button id="btn-new-file" class="text-sm text-slate-400 hover:text-white flex items-center gap-1 transition-colors">
                    <i data-lucide="upload" class="w-4 h-4"></i> Load New
                </button>
            </div>

            <!-- Waveform Container -->
            <div class="relative w-full rounded-lg bg-slate-900/50 border border-slate-700 p-2">
                <div id="loading-overlay" class="absolute inset-0 bg-slate-900/80 z-20 flex flex-col items-center justify-center rounded-lg backdrop-blur-sm hidden">
                    <i data-lucide="loader-2" class="w-8 h-8 text-indigo-500 animate-spin mb-2"></i>
                    <span class="text-sm text-indigo-200 font-medium">Decoding Audio...</span>
                </div>
                
                <div id="waveform" class="w-full cursor-text relative z-10"></div>
                <div id="timeline" class="w-full mt-2 text-xs text-slate-400"></div>
            </div>

            <!-- Controls -->
            <div class="flex flex-col md:flex-row gap-6 justify-between items-center bg-slate-900/50 p-4 rounded-xl border border-slate-700">
                
                <div class="flex items-center gap-3 w-full md:w-auto justify-center md:justify-start">
                    <button id="btn-play-pause" class="w-12 h-12 flex items-center justify-center bg-indigo-600 hover:bg-indigo-500 text-white rounded-full transition-colors shadow-lg shadow-indigo-500/20">
                        <i data-lucide="play" class="w-6 h-6 ml-1" id="icon-play"></i>
                        <i data-lucide="pause" class="w-6 h-6 hidden" id="icon-pause"></i>
                    </button>
                    
                    <button id="btn-play-region" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium flex items-center gap-2 transition-colors tooltip" title="Play only the selected region">
                        <i data-lucide="play-square" class="w-4 h-4"></i> Preview Selection
                    </button>
                </div>

                <div class="flex items-center gap-4 w-full md:w-1/3">
                    <i data-lucide="zoom-out" class="w-4 h-4 text-slate-400"></i>
                    <input type="range" id="zoom-slider" min="10" max="1000" value="10" class="w-full accent-indigo-500 cursor-pointer">
                    <i data-lucide="zoom-in" class="w-4 h-4 text-slate-400"></i>
                </div>

            </div>

            <!-- Trimming Details & Action -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
                <div class="bg-slate-900/50 p-3 rounded-lg border border-slate-700">
                    <label class="text-xs text-slate-400 uppercase tracking-wider font-semibold mb-1 block">Start Time</label>
                    <div class="font-mono text-lg text-indigo-300" id="time-start">00:00.000</div>
                </div>
                <div class="bg-slate-900/50 p-3 rounded-lg border border-slate-700">
                    <label class="text-xs text-slate-400 uppercase tracking-wider font-semibold mb-1 block">End Time</label>
                    <div class="font-mono text-lg text-indigo-300" id="time-end">00:00.000</div>
                </div>
                <button id="btn-trim" class="h-[74px] bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-white rounded-lg font-bold shadow-lg shadow-teal-500/20 transition-all flex items-center justify-center gap-2 text-lg disabled:opacity-50 disabled:cursor-not-allowed">
                    <i data-lucide="scissors" class="w-5 h-5"></i> Trim & Download
                </button>
            </div>

        </div>

        <div class="text-center mt-4">
            <a href="index.html" class="text-slate-500 hover:text-indigo-400 transition-colors text-sm flex items-center justify-center gap-2">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Tools Hub
            </a>
        </div>

    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl border border-slate-600 flex items-center gap-2 transform translate-y-20 opacity-0 transition-all duration-300 z-50 pointer-events-none">
        <i data-lucide="info" class="w-5 h-5 text-indigo-400"></i>
        <span id="toast-msg">Message here</span>
    </div>

    <!-- Web Modules for WaveSurfer -->
    <script type="module">
        import WaveSurfer from 'https://cdn.jsdelivr.net/npm/wavesurfer.js@7/dist/wavesurfer.esm.js';
        import RegionsPlugin from 'https://cdn.jsdelivr.net/npm/wavesurfer.js@7/dist/plugins/regions.esm.js';
        import TimelinePlugin from 'https://cdn.jsdelivr.net/npm/wavesurfer.js@7/dist/plugins/timeline.esm.js';

        // Initialize Icons
        lucide.createIcons();

        // DOM Elements
        const uploadZone = document.getElementById('upload-zone');
        const editorZone = document.getElementById('editor-zone');
        const fileInput = document.getElementById('audio-upload');
        const fileNameDisplay = document.getElementById('file-name');
        const btnNewFile = document.getElementById('btn-new-file');
        
        const btnPlayPause = document.getElementById('btn-play-pause');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        const btnPlayRegion = document.getElementById('btn-play-region');
        const zoomSlider = document.getElementById('zoom-slider');
        
        const timeStartDisplay = document.getElementById('time-start');
        const timeEndDisplay = document.getElementById('time-end');
        const btnTrim = document.getElementById('btn-trim');
        const loadingOverlay = document.getElementById('loading-overlay');
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toast-msg');

        // State
        let wavesurfer = null;
        let wsRegions = null;
        let activeRegion = null;
        let originalFileName = "";
        let audioBlobUrl = null;

        // Utilities
        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            const ms = Math.floor((seconds % 1) * 1000);
            return `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}.${ms.toString().padStart(3, '0')}`;
        }

        function showToast(message, duration = 3000) {
            toastMsg.textContent = message;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, duration);
        }

        // Initialize WaveSurfer
        function initWaveSurfer() {
            if (wavesurfer) {
                wavesurfer.destroy();
            }

            wavesurfer = WaveSurfer.create({
                container: '#waveform',
                waveColor: '#4f46e5', // indigo-600
                progressColor: '#818cf8', // indigo-400
                cursorColor: '#f1f5f9', // slate-100
                barWidth: 2,
                barGap: 1,
                barRadius: 2,
                height: 120,
                normalize: true,
                minPxPerSec: 10,
                plugins: [
                    TimelinePlugin.create({
                        container: '#timeline',
                        height: 20,
                        timeInterval: 0.1,
                        primaryLabelInterval: 1,
                        style: {
                            fontSize: '11px',
                            color: '#94a3b8'
                        }
                    })
                ]
            });

            // Register Regions Plugin
            wsRegions = wavesurfer.registerPlugin(RegionsPlugin.create());

            // WaveSurfer Events
            wavesurfer.on('ready', () => {
                loadingOverlay.classList.add('hidden');
                
                const duration = wavesurfer.getDuration();
                
                // Add default region (middle 50% or first 10 seconds if long)
                const start = duration > 20 ? 5 : duration * 0.1;
                const end = duration > 20 ? 15 : duration * 0.9;

                wsRegions.clearRegions();
                activeRegion = wsRegions.addRegion({
                    start: start,
                    end: end,
                    color: 'rgba(129, 140, 248, 0.25)', // indigo-400 with opacity
                    drag: true,
                    resize: true,
                });

                updateTimeDisplay();
                zoomSlider.value = 10;
            });

            wavesurfer.on('play', () => {
                iconPlay.classList.add('hidden');
                iconPause.classList.remove('hidden');
                btnPlayPause.classList.add('bg-indigo-500');
            });

            wavesurfer.on('pause', () => {
                iconPause.classList.add('hidden');
                iconPlay.classList.remove('hidden');
                btnPlayPause.classList.remove('bg-indigo-500');
            });

            wavesurfer.on('error', (err) => {
                loadingOverlay.classList.add('hidden');
                showToast('Error decoding audio. File might be corrupted.');
                console.error(err);
            });

            // Region Events
            wsRegions.on('region-updated', (region) => {
                activeRegion = region;
                updateTimeDisplay();
            });
            
            wsRegions.on('region-created', (region) => {
                // Keep only one region active
                const regions = wsRegions.getRegions();
                if (regions.length > 1) {
                    regions[0].remove();
                }
                activeRegion = region;
                updateTimeDisplay();
            });
        }

        function updateTimeDisplay() {
            if (activeRegion) {
                timeStartDisplay.textContent = formatTime(activeRegion.start);
                timeEndDisplay.textContent = formatTime(activeRegion.end);
            }
        }

        // File Handling
        function handleFile(file) {
            if (!file) return;
            
            if (!file.type.includes('audio') && !file.name.match(/\.(mp3|m4a|wav|aac|ogg)$/i)) {
                showToast('Please upload a valid audio file (.mp3, .m4a, .wav)');
                return;
            }

            originalFileName = file.name;
            fileNameDisplay.textContent = file.name;
            
            // UI transitions
            uploadZone.classList.add('hidden');
            editorZone.classList.remove('hidden');
            editorZone.classList.add('flex');
            loadingOverlay.classList.remove('hidden');

            if (audioBlobUrl) {
                URL.revokeObjectURL(audioBlobUrl);
            }
            audioBlobUrl = URL.createObjectURL(file);

            initWaveSurfer();
            wavesurfer.load(audioBlobUrl);
        }

        // Upload Listeners
        fileInput.addEventListener('change', (e) => {
            handleFile(e.target.files[0]);
        });

        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('border-indigo-500', 'bg-slate-800');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('border-indigo-500', 'bg-slate-800');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('border-indigo-500', 'bg-slate-800');
            handleFile(e.dataTransfer.files[0]);
        });

        btnNewFile.addEventListener('click', () => {
            if (wavesurfer) {
                wavesurfer.pause();
                wavesurfer.empty();
            }
            editorZone.classList.add('hidden');
            editorZone.classList.remove('flex');
            uploadZone.classList.remove('hidden');
            fileInput.value = '';
        });

        // Controls Listeners
        btnPlayPause.addEventListener('click', () => {
            if (wavesurfer) wavesurfer.playPause();
        });

        btnPlayRegion.addEventListener('click', () => {
            if (activeRegion) {
                activeRegion.play();
            } else {
                showToast('No region selected.');
            }
        });

        zoomSlider.addEventListener('input', (e) => {
            if (wavesurfer) {
                wavesurfer.zoom(Number(e.target.value));
            }
        });

        // Audio Trimming & Exporting Logic
        // Converts AudioBuffer to WAV format Blob
        function audioBufferToWavBlob(buffer) {
            const numOfChan = buffer.numberOfChannels;
            const length = buffer.length * numOfChan * 2 + 44;
            const outBuffer = new ArrayBuffer(length);
            const view = new DataView(outBuffer);
            const channels = [];
            let i;
            let sample;
            let offset = 0;
            let pos = 0;

            // Write WAVE header
            setUint32(0x46464952);                         // "RIFF"
            setUint32(length - 8);                         // file length - 8
            setUint32(0x45564157);                         // "WAVE"

            setUint32(0x20746d66);                         // "fmt " chunk
            setUint32(16);                                 // length = 16
            setUint16(1);                                  // PCM (uncompressed)
            setUint16(numOfChan);
            setUint32(buffer.sampleRate);
            setUint32(buffer.sampleRate * 2 * numOfChan);  // avg. bytes/sec
            setUint16(numOfChan * 2);                      // block-align
            setUint16(16);                                 // 16-bit (hardcoded)

            setUint32(0x61746164);                         // "data" - chunk
            setUint32(length - pos - 4);                   // chunk length

            // Write interleaved data
            for (i = 0; i < buffer.numberOfChannels; i++) {
                channels.push(buffer.getChannelData(i));
            }

            while (pos < length) {
                for (i = 0; i < numOfChan; i++) {
                    sample = Math.max(-1, Math.min(1, channels[i][offset])); // clamp
                    sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767) | 0; // scale to 16-bit int
                    view.setInt16(pos, sample, true);
                    pos += 2;
                }
                offset++;
            }

            return new Blob([outBuffer], { type: 'audio/wav' });

            function setUint16(data) {
                view.setUint16(pos, data, true);
                pos += 2;
            }

            function setUint32(data) {
                view.setUint32(pos, data, true);
                pos += 4;
            }
        }

        btnTrim.addEventListener('click', async () => {
            if (!activeRegion || !wavesurfer) return;

            const originalBuffer = wavesurfer.getDecodedData();
            if (!originalBuffer) {
                showToast("Audio data not ready yet.");
                return;
            }

            try {
                // UI state: Processing
                btnTrim.disabled = true;
                btnTrim.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Processing...';
                lucide.createIcons();

                // Allow UI to update before heavy processing blocks the main thread
                await new Promise(resolve => setTimeout(resolve, 50));

                const start = activeRegion.start;
                const end = activeRegion.end;
                const sampleRate = originalBuffer.sampleRate;
                const channels = originalBuffer.numberOfChannels;

                const startOffset = Math.floor(start * sampleRate);
                const endOffset = Math.floor(end * sampleRate);
                const frameCount = endOffset - startOffset;

                // Edge case handling
                if (frameCount <= 0) {
                    throw new Error("Invalid selection region.");
                }

                // Create a new AudioContext for the offline processing
                const offlineCtx = new OfflineAudioContext(channels, frameCount, sampleRate);
                const trimmedBuffer = offlineCtx.createBuffer(channels, frameCount, sampleRate);

                // Copy data from original buffer to the trimmed buffer
                for (let i = 0; i < channels; i++) {
                    const channelData = originalBuffer.getChannelData(i);
                    const trimmedData = trimmedBuffer.getChannelData(i);
                    for (let j = 0; j < frameCount; j++) {
                        trimmedData[j] = channelData[startOffset + j];
                    }
                }

                // Convert AudioBuffer to WAV Blob
                const wavBlob = audioBufferToWavBlob(trimmedBuffer);

                // Trigger Download
                const downloadUrl = URL.createObjectURL(wavBlob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = downloadUrl;
                
                // Get original name without extension, add _trimmed.wav
                const baseName = originalFileName.replace(/\.[^/.]+$/, "");
                a.download = `${baseName}_trimmed.wav`;
                
                document.body.appendChild(a);
                a.click();
                
                // Cleanup
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(downloadUrl);
                }, 100);

                showToast("Success! Audio trimmed and downloaded.", 4000);

            } catch (error) {
                console.error("Trimming failed:", error);
                showToast("Error during trimming. Selection might be invalid.");
            } finally {
                // Restore UI state
                btnTrim.disabled = false;
                btnTrim.innerHTML = '<i data-lucide="scissors" class="w-5 h-5"></i> Trim & Download';
                lucide.createIcons();
            }
        });

    </script>
</body>
</html>
